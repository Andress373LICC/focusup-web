<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FocusUp Web - MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }
    h1 { color: #333; }
    #timer {
      font-size: 48px;
      margin: 20px 0;
      color: #2c3e50;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>FocusUp Web - MVP</h1>
  <div id="timer">25:00</div>
  <p>Sesiones completadas: <span id="sesiones">0</span></p>
  <button onclick="startTimer()">Iniciar</button>
  <button onclick="pauseTimer()">Pausar</button>
  <button onclick="resetTimer()">Resetear</button>

  <script>
    let time = 25 * 60;
    let timerInterval;
    let running = false;

    function updateTimerDisplay() {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      document.getElementById("timer").textContent =
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateSesionesDisplay() {
      const sesiones = localStorage.getItem("sesionesCompletadas") || 0;
      document.getElementById("sesiones").textContent = sesiones;
    }

    function startTimer() {
      if (!running) {
        running = true;
        timerInterval = setInterval(() => {
          if (time > 0) {
            time--;
            updateTimerDisplay();
          } else {
            clearInterval(timerInterval);
            alert("¡Tiempo terminado! Toma un descanso.");
            running = false;

            let sesiones = localStorage.getItem("sesionesCompletadas") || 0;
            sesiones++;
            localStorage.setItem("sesionesCompletadas", sesiones);
            updateSesionesDisplay();
          }
        }, 1000);
      }
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      running = false;
    }

    function resetTimer() {
      clearInterval(timerInterval);
      time = 25 * 60;
      updateTimerDisplay();
      running = false;
    }

    updateTimerDisplay();
    updateSesionesDisplay();
  </script>
</body>
</html>
